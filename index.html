<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Planguage — translate English into Planguage, where every consonant becomes P."
    />
    <title>Planguage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&family=Fredoka:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="bg-orbs" aria-hidden="true">
      <span class="orb orb-1"></span>
      <span class="orb orb-2"></span>
      <span class="orb orb-3"></span>
    </div>

    <main class="app">
      <header class="hero">
        <button class="mascot-btn" id="mascotBtn" type="button" aria-label="Planguage mascot">
          <img src="assets/mascot.svg" alt="" class="mascot" id="mascot" width="88" height="88" />
        </button>
        <div class="hero-text">
          <h1>Planguage</h1>
          <p class="tagline">Every consonant becomes <strong>P</strong>. Pop epappe!</p>
        </div>
      </header>

      <section class="translator-card" aria-label="Planguage translator">
        <div class="panel panel-input">
          <div class="panel-header">
            <label for="inputText" id="inputLabel">English</label>
            <button
              class="btn-copy"
              id="directionBtn"
              type="button"
              aria-label="Switch to Planguage to English"
              title="Switch to Planguage → English"
            >
              <span id="directionLabel">Planguage → English</span>
            </button>
          </div>
          <textarea
            id="inputText"
            rows="5"
            placeholder="Type something… for example"
            spellcheck="true"
          ></textarea>
          <div class="panel-footer">
            <p class="meta" id="charCount">0 characters</p>
          </div>
        </div>

        <div class="panel panel-output">
          <div class="panel-header">
            <label for="outputText" id="outputLabel">Planguage</label>
            <button class="btn-copy" id="copyBtn" type="button" aria-label="Copy translation">
              Copy
            </button>
          </div>
          <output id="outputText" class="output" for="inputText" aria-live="polite">
            Your translation pops up here…
          </output>
          <div class="panel-footer">
            <p class="example-badge hidden" id="exampleBadge">Canonical example unlocked!</p>
          </div>
        </div>
      </section>
    </main>

    <div class="toast hidden" id="toast" role="status" aria-live="polite"></div>
    <div class="confetti-layer hidden" id="confettiLayer" aria-hidden="true"></div>

    <footer class="site-credit">
      <a
        href="https://github.com/bjsmithxyz/planguage"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="View on GitHub"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" aria-hidden="true">
          <path
            fill="currentColor"
            d="M12 0C5.373 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"
          />
        </svg>
      </a>
      <span>made by beek</span>
    </footer>

    <script type="module" src="js/app.js"></script>
  </body>
</html>
